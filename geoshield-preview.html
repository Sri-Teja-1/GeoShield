<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Geoshield — Interactive Preview</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

<style>
:root {
  --gs-slate-975: #080d14;
  --gs-slate-950: #0d1520;
  --gs-slate-900: #111c2d;
  --gs-slate-800: #1a2d44;
  --gs-slate-700: #243b53;
  --gs-slate-600: #334e68;
  --gs-slate-500: #486581;
  --gs-slate-400: #6b8cae;
  --color-bg: #080d14;
  --color-surface: #0d1520;
  --color-card: #111c2d;
  --color-card-raised: #1a2d44;
  --color-fg: #e8edf5;
  --color-fg-2: #9ca3af;
  --color-fg-3: #6b7280;
  --color-primary: #0ea5e9;
  --color-primary-hover: #38bdf8;
  --color-primary-active: #0284c7;
  --color-primary-subtle: rgba(14, 165, 233, 0.12);
  --color-primary-border: rgba(14, 165, 233, 0.3);
  --color-secondary: #10b981;
  --color-secondary-subtle: rgba(16, 185, 129, 0.12);
  --color-success: #10b981;
  --color-warning: #f59e0b;
  --color-error: #ef4444;
  --color-border: rgba(255, 255, 255, 0.07);
  --color-border-mid: rgba(255, 255, 255, 0.12);
  --color-border-strong: rgba(255, 255, 255, 0.2);
  --font-display: 'Space Grotesk', system-ui, sans-serif;
  --font-body: 'DM Sans', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; background: var(--color-bg); color: var(--color-fg); font-family: var(--font-body); -webkit-font-smoothing: antialiased; overflow-x: hidden; }
#root { width: 100vw; min-height: 100vh; }

::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.16); }

button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input, textarea { font-family: inherit; }
a { color: inherit; text-decoration: none; }

@keyframes gs-shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}
.gs-skeleton {
  background: linear-gradient(90deg, var(--gs-slate-900) 25%, var(--gs-slate-800) 50%, var(--gs-slate-900) 75%);
  background-size: 200% 100%;
  animation: gs-shimmer 1.5s infinite linear;
  border-radius: 6px;
}

@keyframes gs-pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}
.gs-pulse { animation: gs-pulse 1.5s ease-in-out infinite; }

@keyframes gs-reticle-pulse {
  0% { transform: scale(0.6); opacity: 0.9; }
  100% { transform: scale(2.4); opacity: 0; }
}

@keyframes gs-radar-sweep {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

@keyframes gs-fade-up {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.gs-fade-up { animation: gs-fade-up 250ms ease-out backwards; }

@keyframes gs-button-sweep {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(100%); }
}

.leaflet-container { background: var(--gs-slate-975) !important; }
.leaflet-control-attribution { background: rgba(13,21,32,0.85) !important; color: var(--color-fg-3) !important; font-family: var(--font-mono) !important; font-size: 9px !important; }
.leaflet-control-attribution a { color: var(--color-fg-2) !important; }

.gs-reticle-marker {
  position: relative;
  width: 18px;
  height: 18px;
}
.gs-reticle-marker .ring {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  border: 1.5px solid currentColor;
  background: transparent;
}
.gs-reticle-marker .dot {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: currentColor;
  transform: translate(-50%, -50%);
}
.gs-reticle-marker .pulse {
  position: absolute;
  inset: -2px;
  border-radius: 50%;
  border: 1.5px solid currentColor;
  animation: gs-reticle-pulse 2s ease-out infinite;
}

.gs-pin-marker {
  width: 22px; height: 22px;
  display: flex; align-items: center; justify-content: center;
}
.gs-pin-marker .pin-ring {
  width: 22px; height: 22px;
  border-radius: 50%;
  border: 2px solid var(--color-primary);
  background: rgba(14,165,233,0.25);
  box-shadow: 0 0 0 4px rgba(14,165,233,0.15);
  animation: gs-pulse 1.6s ease-in-out infinite;
}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js" crossorigin="anonymous"></script>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

const DS = {
  bg: 'var(--color-bg)', surface: 'var(--color-surface)', card: 'var(--color-card)',
  cardRaised: 'var(--color-card-raised)',
  fg: 'var(--color-fg)', fg2: 'var(--color-fg-2)', fg3: 'var(--color-fg-3)',
  primary: 'var(--color-primary)', primaryHover: 'var(--color-primary-hover)',
  primarySubtle: 'var(--color-primary-subtle)', primaryBorder: 'var(--color-primary-border)',
  secondary: 'var(--color-secondary)', secondarySubtle: 'var(--color-secondary-subtle)',
  success: 'var(--color-success)', warning: 'var(--color-warning)', error: 'var(--color-error)',
  border: 'var(--color-border)', borderMid: 'var(--color-border-mid)', borderStrong: 'var(--color-border-strong)',
  display: 'var(--font-display)', body: 'var(--font-body)', mono: 'var(--font-mono)',
};

// ================== ICONS (inline SVG) ==================
const Icon = ({ name, size = 14, color = 'currentColor', strokeWidth = 1.6 }) => {
  const s = { width: size, height: size, fill: 'none', stroke: color, strokeWidth, strokeLinecap: 'round', strokeLinejoin: 'round' };
  const map = {
    plus: <svg viewBox="0 0 24 24" {...s}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
    minus: <svg viewBox="0 0 24 24" {...s}><line x1="5" y1="12" x2="19" y2="12"/></svg>,
    x: <svg viewBox="0 0 24 24" {...s}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
    check: <svg viewBox="0 0 24 24" {...s}><polyline points="20 6 9 17 4 12"/></svg>,
    chevronDown: <svg viewBox="0 0 24 24" {...s}><polyline points="6 9 12 15 18 9"/></svg>,
    chevronRight: <svg viewBox="0 0 24 24" {...s}><polyline points="9 18 15 12 9 6"/></svg>,
    chevronLeft: <svg viewBox="0 0 24 24" {...s}><polyline points="15 18 9 12 15 6"/></svg>,
    arrowRight: <svg viewBox="0 0 24 24" {...s}><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>,
    upload: <svg viewBox="0 0 24 24" {...s}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>,
    mapPin: <svg viewBox="0 0 24 24" {...s}><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>,
    crosshair: <svg viewBox="0 0 24 24" {...s}><circle cx="12" cy="12" r="9"/><line x1="12" y1="3" x2="12" y2="7"/><line x1="12" y1="17" x2="12" y2="21"/><line x1="3" y1="12" x2="7" y2="12"/><line x1="17" y1="12" x2="21" y2="12"/></svg>,
    sliders: <svg viewBox="0 0 24 24" {...s}><line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/></svg>,
    cpu: <svg viewBox="0 0 24 24" {...s}><rect x="4" y="4" width="16" height="16" rx="2" ry="2"/><rect x="9" y="9" width="6" height="6"/><line x1="9" y1="1" x2="9" y2="4"/><line x1="15" y1="1" x2="15" y2="4"/><line x1="9" y1="20" x2="9" y2="23"/><line x1="15" y1="20" x2="15" y2="23"/><line x1="20" y1="9" x2="23" y2="9"/><line x1="20" y1="14" x2="23" y2="14"/><line x1="1" y1="9" x2="4" y2="9"/><line x1="1" y1="14" x2="4" y2="14"/></svg>,
    eye: <svg viewBox="0 0 24 24" {...s}><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>,
    layers: <svg viewBox="0 0 24 24" {...s}><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>,
    database: <svg viewBox="0 0 24 24" {...s}><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>,
    flame: <svg viewBox="0 0 24 24" {...s}><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>,
    info: <svg viewBox="0 0 24 24" {...s}><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>,
    bookmark: <svg viewBox="0 0 24 24" {...s}><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>,
    download: <svg viewBox="0 0 24 24" {...s}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
    play: <svg viewBox="0 0 24 24" {...s}><polygon points="5 3 19 12 5 21 5 3"/></svg>,
    git: <svg viewBox="0 0 24 24" {...s}><circle cx="6" cy="3" r="2"/><circle cx="6" cy="21" r="2"/><circle cx="18" cy="12" r="2"/><path d="M6 5v14"/><path d="M6 12h10"/></svg>,
    refresh: <svg viewBox="0 0 24 24" {...s}><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>,
    shield: <svg viewBox="0 0 24 24" {...s}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>,
    target: <svg viewBox="0 0 24 24" {...s}><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>,
    branch: <svg viewBox="0 0 24 24" {...s}><line x1="6" y1="3" x2="6" y2="15"/><circle cx="18" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><path d="M18 9a9 9 0 0 1-9 9"/></svg>,
  };
  return map[name] || null;
};

// ================== SHARED COMPONENTS ==================

const Button = ({ children, variant = 'primary', size = 'md', icon, iconRight, full = false, onClick, disabled = false, loading = false, style = {} }) => {
  const sizes = {
    sm: { padding: '6px 12px', fontSize: 12, gap: 6 },
    md: { padding: '10px 16px', fontSize: 13, gap: 8 },
    lg: { padding: '12px 20px', fontSize: 14, gap: 8 },
  };
  const variants = {
    primary: {
      background: loading ? 'rgba(14,165,233,0.7)' : 'linear-gradient(135deg, #0ea5e9, #0369a1)',
      color: '#fff',
      border: 'none',
    },
    secondary: {
      background: 'transparent',
      color: DS.primary,
      border: `1px solid ${DS.primaryBorder}`,
    },
    ghost: {
      background: 'transparent',
      color: DS.fg2,
      border: `1px solid ${DS.border}`,
    },
    tertiary: {
      background: 'transparent',
      color: DS.primary,
      border: 'none',
      padding: 0,
    },
  };
  const s = sizes[size];
  const v = variants[variant];
  return (
    <button onClick={onClick} disabled={disabled || loading} style={{
      ...s, ...v,
      width: full ? '100%' : 'auto',
      borderRadius: 6,
      fontWeight: 500,
      display: 'inline-flex',
      alignItems: 'center',
      justifyContent: 'center',
      gap: s.gap,
      cursor: disabled ? 'not-allowed' : 'pointer',
      opacity: disabled && !loading ? 0.5 : 1,
      position: 'relative',
      overflow: 'hidden',
      transition: 'all 200ms cubic-bezier(0.4,0,0.2,1)',
      fontFamily: DS.body,
      ...style,
    }}>
      {loading && (
        <div style={{
          position: 'absolute',
          inset: 0,
          background: 'linear-gradient(90deg, transparent, rgba(255,255,255,0.18), transparent)',
          animation: 'gs-button-sweep 1.5s linear infinite',
        }}/>
      )}
      <span style={{ display: 'inline-flex', alignItems: 'center', gap: s.gap, position: 'relative', zIndex: 1 }}>
        {icon && <Icon name={icon} size={s.fontSize}/>}
        {children}
        {iconRight && <Icon name={iconRight} size={s.fontSize}/>}
      </span>
    </button>
  );
};

const Eyebrow = ({ children, color = DS.primary }) => (
  <div style={{
    fontFamily: DS.mono, fontSize: 10, color,
    letterSpacing: '0.14em', textTransform: 'uppercase',
    fontWeight: 500, marginBottom: 4,
  }}>{children}</div>
);

const ToggleGroup = ({ value, onChange, options }) => (
  <div style={{
    display: 'inline-flex',
    background: DS.card,
    border: `1px solid ${DS.border}`,
    borderRadius: 6,
    padding: 3,
    gap: 2,
  }}>
    {options.map(o => {
      const active = o.value === value;
      return (
        <button key={o.value} onClick={() => onChange(o.value)} style={{
          padding: '6px 12px',
          fontSize: 12,
          fontFamily: DS.body,
          fontWeight: 500,
          background: active ? DS.primary : 'transparent',
          color: active ? '#fff' : DS.fg2,
          borderRadius: 4,
          transition: 'all 200ms ease',
        }}>{o.label}</button>
      );
    })}
  </div>
);

const ConfidenceDots = ({ score, max = 5, size = 8 }) => {
  const colorFor = (s) => s >= 4 ? DS.success : s >= 3 ? DS.warning : DS.error;
  const c = colorFor(score);
  return (
    <div style={{ display: 'inline-flex', gap: 4, alignItems: 'center' }}>
      {[...Array(max)].map((_, i) => (
        <div key={i} style={{
          width: size, height: size, borderRadius: '50%',
          background: i < score ? c : 'rgba(255,255,255,0.1)',
          border: i < score ? 'none' : `1px solid rgba(255,255,255,0.15)`,
          boxShadow: i < score ? `0 0 6px ${c}66` : 'none',
        }}/>
      ))}
    </div>
  );
};

const ConfidenceLabel = ({ score }) => {
  const label = score >= 4 ? 'High' : score >= 3 ? 'Medium' : 'Low';
  const color = score >= 4 ? DS.success : score >= 3 ? DS.warning : DS.error;
  return (
    <span style={{ fontFamily: DS.body, fontSize: 12, fontWeight: 500, color, letterSpacing: '0.01em' }}>
      Confidence: {label} ({score}/5)
    </span>
  );
};

// ================== TOP NAV ==================

const TopNav = ({ active, onNavigate }) => {
  const items = ['Overview', 'Analysis', 'Archive', 'Architecture'];
  return (
    <div style={{
      height: 64,
      background: 'rgba(8,13,20,0.85)',
      backdropFilter: 'blur(12px)',
      borderBottom: `1px solid ${DS.border}`,
      display: 'flex',
      alignItems: 'center',
      padding: '0 32px',
      flexShrink: 0,
      position: 'sticky',
      top: 0,
      zIndex: 100,
    }}>
      {/* Logo */}
      <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginRight: 40 }}>
        <div style={{
          width: 28, height: 28, borderRadius: 7,
          background: 'linear-gradient(135deg, #0ea5e9, #0369a1)',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          boxShadow: '0 0 12px rgba(14,165,233,0.4)',
        }}>
          <Icon name="shield" size={15} color="#fff"/>
        </div>
        <div style={{
          fontFamily: DS.display, fontSize: 14, fontWeight: 700,
          letterSpacing: '0.06em', color: DS.fg, textTransform: 'uppercase',
        }}>
          GEO<span style={{ color: DS.primary }}>SHIELD</span>
        </div>
      </div>

      {/* Nav items */}
      <nav style={{ display: 'flex', gap: 4 }}>
        {items.map(item => {
          const isActive = active === item.toLowerCase();
          return (
            <button key={item} onClick={() => onNavigate(item.toLowerCase())} style={{
              padding: '8px 16px',
              fontSize: 13,
              fontWeight: 500,
              color: isActive ? DS.fg : DS.fg2,
              position: 'relative',
              transition: 'color 150ms ease',
            }}
            onMouseEnter={e => !isActive && (e.currentTarget.style.color = DS.fg)}
            onMouseLeave={e => !isActive && (e.currentTarget.style.color = DS.fg2)}>
              {item}
              {isActive && (
                <div style={{
                  position: 'absolute',
                  bottom: -22,
                  left: 16, right: 16,
                  height: 2,
                  background: DS.primary,
                  borderRadius: 1,
                }}/>
              )}
            </button>
          );
        })}
      </nav>

      {/* Right side: status */}
      <div style={{ marginLeft: 'auto', display: 'flex', alignItems: 'center', gap: 16 }}>
        <div style={{
          display: 'inline-flex', alignItems: 'center', gap: 6,
          fontFamily: DS.mono, fontSize: 11, color: DS.fg2,
          letterSpacing: '0.08em',
        }}>
          <span className="gs-pulse" style={{
            width: 6, height: 6, borderRadius: '50%',
            background: DS.success,
            boxShadow: `0 0 6px ${DS.success}`,
          }}/>
          QDRANT · OK
        </div>
      </div>
    </div>
  );
};

// ================== OVERVIEW PAGE ==================

const Radar = () => {
  return (
    <div style={{
      width: 480, height: 480,
      position: 'relative',
      flexShrink: 0,
    }}>
      <svg width="480" height="480" viewBox="0 0 480 480" style={{ position: 'absolute', inset: 0 }}>
        {/* Concentric circles */}
        {[60, 120, 180, 220].map(r => (
          <circle key={r} cx="240" cy="240" r={r} fill="none" stroke="rgba(14,165,233,0.12)" strokeWidth="1"/>
        ))}
        {/* Crosshairs */}
        <line x1="20" y1="240" x2="460" y2="240" stroke="rgba(14,165,233,0.15)" strokeWidth="1"/>
        <line x1="240" y1="20" x2="240" y2="460" stroke="rgba(14,165,233,0.15)" strokeWidth="1"/>
        <line x1="86" y1="86" x2="394" y2="394" stroke="rgba(14,165,233,0.08)" strokeWidth="1" strokeDasharray="2 4"/>
        <line x1="394" y1="86" x2="86" y2="394" stroke="rgba(14,165,233,0.08)" strokeWidth="1" strokeDasharray="2 4"/>

        {/* Land masses */}
        <path d="M 180 200 Q 200 180, 230 190 Q 260 195, 270 220 Q 265 245, 240 250 Q 210 245, 195 230 Z" fill="rgba(16,185,129,0.18)" stroke="rgba(16,185,129,0.4)" strokeWidth="1"/>
        <path d="M 285 210 Q 305 215, 310 235 Q 305 250, 290 245 Z" fill="rgba(16,185,129,0.18)" stroke="rgba(16,185,129,0.4)" strokeWidth="1"/>
        <path d="M 195 270 Q 215 275, 220 290 Q 210 300, 195 295 Z" fill="rgba(16,185,129,0.18)" stroke="rgba(16,185,129,0.4)" strokeWidth="1"/>

        {/* Center reticle */}
        <circle cx="240" cy="240" r="6" fill={DS.primary}/>
        <circle cx="240" cy="240" r="14" fill="none" stroke={DS.primary} strokeWidth="1.5"/>

        {/* Markers */}
        <circle cx="295" cy="225" r="4" fill={DS.primary}/>
        <circle cx="200" cy="285" r="4" fill="#fcd34d"/>
        <circle cx="220" cy="195" r="4" fill={DS.success}/>
        <circle cx="280" cy="280" r="4" fill="#fca5a5"/>

        {/* Sweep beam */}
        <g style={{ transformOrigin: '240px 240px', animation: 'gs-radar-sweep 6s linear infinite' }}>
          <defs>
            <linearGradient id="sweep" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stopColor={DS.primary} stopOpacity="0.5"/>
              <stop offset="100%" stopColor={DS.primary} stopOpacity="0"/>
            </linearGradient>

const CoordinatePicker = ({ isOpen, onClose, onConfirm, initialLat, initialLon }) => {
  const mapRef = useRef(null);
  const mapInstance = useRef(null);
  const markerRef = useRef(null);
  const [lat, setLat] = useState(initialLat ?? 47.6062);
  const [lon, setLon] = useState(initialLon ?? -122.3321);
  const [latStr, setLatStr] = useState(String(initialLat ?? 47.6062));
  const [lonStr, setLonStr] = useState(String(initialLon ?? -122.3321));
  const [latError, setLatError] = useState('');
  const [lonError, setLonError] = useState('');

  useEffect(() => {
    if (!isOpen || !mapRef.current) return;
    if (mapInstance.current) return;

    const map = L.map(mapRef.current, {
      center: [lat, lon],
      zoom: 11,
      zoomControl: false,
      attributionControl: true,
    });

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a>',
      subdomains: 'abcd',
      maxZoom: 19,
    }).addTo(map);

    L.control.zoom({ position: 'topleft' }).addTo(map);

    const markerEl = document.createElement('div');
    markerEl.className = 'gs-pin-marker';
    markerEl.innerHTML = '<div class="pin-ring"></div>';
    const icon = L.divIcon({ className: '', html: markerEl.outerHTML, iconSize: [22,22], iconAnchor: [11,11] });
    markerRef.current = L.marker([lat, lon], { icon }).addTo(map);

    map.on('click', (e) => {
      const newLat = e.latlng.lat;
      const newLon = e.latlng.lng;
      setLat(newLat);
      setLon(newLon);
      setLatStr(newLat.toFixed(6));
      setLonStr(newLon.toFixed(6));
      setLatError(''); setLonError('');
      if (markerRef.current) {
        markerRef.current.setLatLng([newLat, newLon]);
      }
    });

    mapInstance.current = map;

    setTimeout(() => map.invalidateSize(), 50);

    return () => {
      // Don't destroy on close so the map persists between opens
    };
  }, [isOpen]);

  // Cleanup when fully unmounted
  useEffect(() => {
    return () => {
      if (mapInstance.current) {
        mapInstance.current.remove();
        mapInstance.current = null;
      }
    };
  }, []);

  // When user types coords, update map
  const validateAndSyncFromInputs = (newLatStr, newLonStr) => {
    const newLat = parseFloat(newLatStr);
    const newLon = parseFloat(newLonStr);
    let lErr = '', oErr = '';
    if (isNaN(newLat) || newLat < -90 || newLat > 90) lErr = 'Latitude must be between -90 and 90';
    if (isNaN(newLon) || newLon < -180 || newLon > 180) oErr = 'Longitude must be between -180 and 180';
    setLatError(lErr); setLonError(oErr);
    if (!lErr && !oErr && mapInstance.current && markerRef.current) {
      setLat(newLat); setLon(newLon);
      markerRef.current.setLatLng([newLat, newLon]);
      mapInstance.current.setView([newLat, newLon], mapInstance.current.getZoom());
    }
  };

  if (!isOpen) return null;

  const isValid = !latError && !lonError && latStr && lonStr;

  return (
    <div style={{
      position: 'fixed', inset: 0, zIndex: 400,
      background: 'rgba(8,13,20,0.85)',
      backdropFilter: 'blur(8px)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      padding: 32,
    }} onClick={onClose}>
      <div style={{
        width: '60vw', maxWidth: 1100,
        height: '70vh', maxHeight: 720,
        background: DS.surface,
        border: `1px solid ${DS.borderMid}`,
        borderRadius: 10,
        overflow: 'hidden',
        display: 'flex', flexDirection: 'column',
        boxShadow: '0 24px 60px rgba(0,0,0,0.7)',
      }} onClick={e => e.stopPropagation()}>
        {/* Header */}
        <div style={{
          padding: '16px 24px',
          borderBottom: `1px solid ${DS.border}`,
          display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        }}>
          <div>
            <Eyebrow>§ COORDINATE PICKER</Eyebrow>
            <div style={{ fontFamily: DS.display, fontSize: 18, fontWeight: 600, color: DS.fg, marginTop: 2 }}>
              Select target location
            </div>
          </div>
          <button onClick={onClose} style={{
            width: 32, height: 32, borderRadius: 6,
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            color: DS.fg2,
          }}
          onMouseEnter={e => { e.currentTarget.style.background = 'rgba(255,255,255,0.05)'; e.currentTarget.style.color = DS.fg; }}
          onMouseLeave={e => { e.currentTarget.style.background = 'transparent'; e.currentTarget.style.color = DS.fg2; }}>
            <Icon name="x" size={16}/>
          </button>
        </div>

        {/* Map */}
        <div style={{ flex: 1, position: 'relative', minHeight: 0 }}>
          <div ref={mapRef} style={{ position: 'absolute', inset: 0 }}/>

          {/* Manual input panel — bottom right */}
          <div style={{
            position: 'absolute', bottom: 16, right: 16,
            background: 'rgba(13,21,32,0.92)',
            border: `1px solid ${DS.borderMid}`,
            borderRadius: 8,
            backdropFilter: 'blur(10px)',
            padding: 14,
            width: 240,
            zIndex: 500,
          }}>
            <Eyebrow>MANUAL ENTRY</Eyebrow>
            <div style={{ marginTop: 10 }}>
              <label style={{ fontFamily: DS.mono, fontSize: 10, color: DS.fg3, letterSpacing: '0.08em', display: 'block', marginBottom: 4 }}>LATITUDE</label>
              <input
                type="text"
                value={latStr}
                onChange={e => { setLatStr(e.target.value); validateAndSyncFromInputs(e.target.value, lonStr); }}
                style={{
                  width: '100%', padding: '7px 10px',
                  background: DS.bg,
                  border: `1px solid ${latError ? DS.error : DS.border}`,
                  borderRadius: 4,
                  color: DS.fg,
                  fontFamily: DS.mono, fontSize: 12,
                  outline: 'none',
                }}
              />
              {latError && <div style={{ fontSize: 10, color: DS.error, marginTop: 3 }}>{latError}</div>}
            </div>
            <div style={{ marginTop: 10 }}>
              <label style={{ fontFamily: DS.mono, fontSize: 10, color: DS.fg3, letterSpacing: '0.08em', display: 'block', marginBottom: 4 }}>LONGITUDE</label>
              <input
                type="text"
                value={lonStr}
                onChange={e => { setLonStr(e.target.value); validateAndSyncFromInputs(latStr, e.target.value); }}
                style={{
                  width: '100%', padding: '7px 10px',
                  background: DS.bg,
                  border: `1px solid ${lonError ? DS.error : DS.border}`,
                  borderRadius: 4,
                  color: DS.fg,
                  fontFamily: DS.mono, fontSize: 12,
                  outline: 'none',
                }}
              />
              {lonError && <div style={{ fontSize: 10, color: DS.error, marginTop: 3 }}>{lonError}</div>}
            </div>
          </div>

          {/* Hint pill — top right */}
          <div style={{
            position: 'absolute', top: 16, right: 16,
            background: 'rgba(13,21,32,0.85)',
            border: `1px solid ${DS.border}`,
            borderRadius: 6,
            padding: '6px 10px',
            backdropFilter: 'blur(6px)',
            fontFamily: DS.mono, fontSize: 10, color: DS.fg2,
            letterSpacing: '0.06em',
            zIndex: 500,
          }}>
            Click map or type to set coordinates
          </div>
        </div>

        {/* Footer */}
        <div style={{
          padding: '14px 24px',
          borderTop: `1px solid ${DS.border}`,
          display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        }}>
          <div style={{ fontFamily: DS.mono, fontSize: 11, color: DS.fg3 }}>
            Selected: <span style={{ color: DS.fg }}>{lat.toFixed(4)}°, {lon.toFixed(4)}°</span>
          </div>
          <div style={{ display: 'flex', gap: 8 }}>
            <Button variant="ghost" size="md" onClick={onClose}>Cancel</Button>
            <Button variant="primary" size="md" disabled={!isValid} onClick={() => { onConfirm({ lat, lon }); onClose(); }}>
              Confirm
            </Button>
          </div>
        </div>
      </div>
    </div>
  );
};

const AnalysisPage = () => {
  const [coords, setCoords] = useState(null);
  const [pickerOpen, setPickerOpen] = useState(false);
  const [classes, setClasses] = useState(['dense_forest', 'cropland', 'water_body', 'urban_dev', 'deforestation']);
  const [newClass, setNewClass] = useState('');
  const [radius, setRadius] = useState('5km');
  const [temporal, setTemporal] = useState('All');
  const [imageUploaded, setImageUploaded] = useState(false);
  const [reportState, setReportState] = useState('idle'); // idle | running | done
  const [activeStage, setActiveStage] = useState(null);
  const [populatedSections, setPopulatedSections] = useState(new Set());
  const fileInputRef = useRef(null);

  const handleRun = () => {
    if (reportState === 'running') return;
    setReportState('running');
    setPopulatedSections(new Set());

    // Simulate progressive reveal
    const timeline = [
      { t: 200, stage: 'validate' },
      { t: 600, stage: 'preprocess' },
      { t: 1100, stage: 'describe' },
      { t: 2200, stage: 'synthesize', section: 'visual' },
      { t: 2700, stage: 'retrieve', section: 'priors' },
      { t: 3500, stage: 'classify', section: 'headline' },
      { t: 3800, stage: 'classify', section: 'interpretation' },
      { t: 4000, stage: 'store' },
      { t: 4200, stage: 'format', section: 'trace', done: true },
    ];

    timeline.forEach(({ t, stage, section, done }) => {
      setTimeout(() => {
        setActiveStage(stage);
        if (section) setPopulatedSections(prev => new Set([...prev, section]));
        if (done) setReportState('done');
      }, t);
    });
  };

  const reset = () => {
    setReportState('idle');
    setActiveStage(null);
    setPopulatedSections(new Set());
  };

  const addClass = () => {
    const c = newClass.trim().toLowerCase().replace(/\s+/g, '_');
    if (c && !classes.includes(c) && classes.length < 50) {
      setClasses([...classes, c]);
      setNewClass('');
    }
  };

  const canRun = imageUploaded && coords && classes.length >= 2;

  return (
    <>
      <div style={{ display: 'grid', gridTemplateColumns: '40fr 60fr', minHeight: 'calc(100vh - 64px)' }}>

        {/* ============ LEFT PANEL ============ */}
        <div style={{
          background: DS.surface, borderRight: `1px solid ${DS.border}`,
          padding: '32px 36px', overflowY: 'auto', maxHeight: 'calc(100vh - 64px)',
        }}>
          <Eyebrow>§ ANALYSIS · CONFIGURE</Eyebrow>
          <h2 style={{ fontFamily: DS.display, fontSize: 32, fontWeight: 600, letterSpacing: '-0.02em', color: DS.fg, marginTop: 8, marginBottom: 8 }}>
            Run a classification
          </h2>
          <div style={{ fontSize: 13.5, color: DS.fg2, lineHeight: 1.55, fontWeight: 300, marginBottom: 32 }}>
            Submit an RGB satellite image, a coordinate, and a class taxonomy. The agent fans
            out per-patch description, retrieves prior context, then classifies.
          </div>

          {/* IMAGERY */}
          <div style={{ marginBottom: 24 }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10 }}>
              <Eyebrow>01 · IMAGERY</Eyebrow>
              <span style={{ fontFamily: DS.mono, fontSize: 10, color: DS.fg3, letterSpacing: '0.08em' }}>PNG · JPEG · ≤20MB</span>
            </div>
            <input ref={fileInputRef} type="file" accept="image/png,image/jpeg" style={{ display: 'none' }}
              onChange={() => setImageUploaded(true)}/>
            <div onClick={() => fileInputRef.current?.click()} style={{
              background: imageUploaded ? 'rgba(16,185,129,0.05)' : DS.card,
              border: `1px dashed ${imageUploaded ? DS.success : DS.borderMid}`,
              borderRadius: 8, padding: '32px 16px',
              textAlign: 'center', cursor: 'pointer',
              transition: 'all 200ms ease',
            }}>
              <div style={{
                width: 40, height: 40, borderRadius: '50%',
                background: imageUploaded ? 'rgba(16,185,129,0.1)' : DS.primarySubtle,
                display: 'inline-flex', alignItems: 'center', justifyContent: 'center', marginBottom: 12,
              }}>
                <Icon name={imageUploaded ? 'check' : 'upload'} size={16} color={imageUploaded ? DS.success : DS.primary}/>
              </div>
              <div style={{ fontFamily: DS.body, fontSize: 14, fontWeight: 500, color: DS.fg, marginBottom: 4 }}>
                {imageUploaded ? 'satellite_image.png' : 'Drop satellite imagery here'}
              </div>
              <div style={{ fontSize: 11.5, color: DS.fg3 }}>
                {imageUploaded ? 'Click to replace' : 'or click to browse · RGB only · 224px min'}
              </div>
            </div>
          </div>

          {/* COORDINATES */}
          <div style={{ marginBottom: 24 }}>

const ArchitecturePage = () => {
  const [hoveredNode, setHoveredNode] = useState(null);
  const [hoverPos, setHoverPos] = useState({ x: 0, y: 0 });
  const containerRef = useRef(null);

  const nodeColor = (type) => {
    if (type === 'decision') return { bg: 'rgba(14,165,233,0.10)', border: DS.primaryBorder, accent: DS.primary };
    if (type === 'conditional') return { bg: 'rgba(245,158,11,0.08)', border: 'rgba(245,158,11,0.3)', accent: '#fcd34d' };
    if (type === 'parallel') return { bg: 'rgba(16,185,129,0.08)', border: 'rgba(16,185,129,0.3)', accent: DS.success };
    return { bg: DS.card, border: DS.border, accent: DS.fg2 };
  };

  const nodeMap = useMemo(() => Object.fromEntries(NODES.map(n => [n.id, n])), []);

  const renderEdge = (e, idx) => {
    const from = nodeMap[e.from];
    const to = nodeMap[e.to];
    if (!from || !to) return null;

    const fromX = from.x + 75;
    const fromY = from.y + 30;
    const toX = to.x + 75;
    const toY = to.y;

    const dasharray = e.type === 'conditional' ? '4 4' : e.type === 'retry' ? '2 6' : 'none';
    const stroke = e.type === 'conditional' ? '#fcd34d' :
                   e.type === 'retry' ? DS.error :
                   e.type === 'parallel' ? DS.success : DS.fg3;
    const strokeOpacity = e.type === 'linear' ? 0.4 : 0.7;

    let path;
    if (e.type === 'retry') {
      // Curved loop from retry_vllm back up to classify
      path = `M ${fromX} ${from.y} Q ${fromX - 80} ${from.y - 40}, ${toX - 80} ${to.y + 30} Q ${toX - 40} ${to.y + 60}, ${toX} ${to.y + 30}`;
    } else if (Math.abs(fromX - toX) > 10) {
      // Diagonal/branching
      const midY = (fromY + toY) / 2;
      path = `M ${fromX} ${fromY} Q ${fromX} ${midY}, ${(fromX + toX) / 2} ${midY} T ${toX} ${toY}`;
    } else {
      path = `M ${fromX} ${fromY} L ${toX} ${toY}`;
    }

    const labelX = (fromX + toX) / 2;
    const labelY = (fromY + toY) / 2;

    return (
      <g key={idx}>
        <path d={path} fill="none" stroke={stroke} strokeWidth="1.5" strokeDasharray={dasharray} opacity={strokeOpacity} markerEnd={e.type === 'retry' ? 'url(#arrow-retry)' : 'url(#arrow)'}/>
        {e.label && (
          <g>
            <rect x={labelX - 36} y={labelY - 8} width="72" height="16" rx="3" fill={DS.bg} stroke={stroke} strokeOpacity="0.4" strokeWidth="0.5"/>
            <text x={labelX} y={labelY + 3} textAnchor="middle" fontFamily={DS.mono} fontSize="9" fill={stroke} letterSpacing="0.04em">
              {e.label}
            </text>
          </g>
        )}
      </g>
    );
  };

  return (
    <div ref={containerRef} style={{
      height: 'calc(100vh - 64px)',
      background: 'radial-gradient(circle at 50% 0%, rgba(14,165,233,0.04), transparent 50%), ' + DS.bg,
      position: 'relative',
      overflow: 'auto',
    }}
    onMouseLeave={() => setHoveredNode(null)}>

      {/* Header overlay */}
      <div style={{ padding: '24px 36px 16px', position: 'sticky', top: 0, background: DS.bg, zIndex: 20, borderBottom: `1px solid ${DS.border}` }}>
        <Eyebrow>§ ARCHITECTURE · LANGGRAPH AGENT</Eyebrow>
        <h2 style={{ fontFamily: DS.display, fontSize: 28, fontWeight: 600, letterSpacing: '-0.02em', color: DS.fg, marginTop: 8 }}>
          Agent Graph
        </h2>
        <div style={{ fontSize: 13, color: DS.fg2, fontWeight: 300, marginTop: 4, maxWidth: 720, lineHeight: 1.55 }}>
          Compiled once at FastAPI startup. Hover a node to see its IO contract.
          Conditional edges are dashed; retry edges loop back.
        </div>
        <div style={{ display: 'flex', gap: 16, marginTop: 12, fontFamily: DS.mono, fontSize: 11, color: DS.fg3 }}>
          <span>{NODES.length} nodes</span>
          <span>·</span>
          <span>{EDGES.length} edges</span>
          <span>·</span>
          <span>3 conditional branches</span>
          <span>·</span>
          <span>1 retry loop</span>
        </div>
      </div>

      {/* Legend */}
      <div style={{
        position: 'sticky', top: 130, marginLeft: 'auto', float: 'right',
        marginTop: 16, marginRight: 32,
        background: 'rgba(13,21,32,0.92)',
        border: `1px solid ${DS.border}`,
        borderRadius: 8, padding: 14,
        backdropFilter: 'blur(8px)',
        zIndex: 15,
        width: 220,
      }}>
        <Eyebrow>LEGEND</Eyebrow>
        <div style={{ marginTop: 10, fontSize: 11, fontFamily: DS.mono, color: DS.fg2, display: 'flex', flexDirection: 'column', gap: 8 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
            <svg width="32" height="2"><line x1="0" y1="1" x2="32" y2="1" stroke={DS.fg3} strokeWidth="1.5"/></svg>
            <span>linear edge</span>
          </div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
            <svg width="32" height="2"><line x1="0" y1="1" x2="32" y2="1" stroke="#fcd34d" strokeWidth="1.5" strokeDasharray="4 4"/></svg>
            <span>conditional edge</span>
          </div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
            <svg width="32" height="2"><line x1="0" y1="1" x2="32" y2="1" stroke={DS.error} strokeWidth="1.5" strokeDasharray="2 6"/></svg>
            <span>retry / loop</span>
          </div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
            <svg width="32" height="2"><line x1="0" y1="1" x2="32" y2="1" stroke={DS.success} strokeWidth="1.5"/></svg>
            <span>parallel fan-out</span>
          </div>
        </div>
      </div>

      {/* Graph canvas */}
      <div style={{ position: 'relative', width: 1100, height: 940, margin: '20px auto 80px' }}>
        <svg width="1100" height="940" style={{ position: 'absolute', inset: 0, pointerEvents: 'none' }}>
          <defs>
            <marker id="arrow" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="6" markerHeight="6" orient="auto">
              <polygon points="0 0, 8 4, 0 8" fill={DS.fg3}/>
            </marker>
            <marker id="arrow-retry" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="6" markerHeight="6" orient="auto">
              <polygon points="0 0, 8 4, 0 8" fill={DS.error}/>
            </marker>
          </defs>
          {EDGES.map((e, i) => renderEdge(e, i))}
        </svg>

        {NODES.map(n => {
          const colors = nodeColor(n.type);
          const isHovered = hoveredNode === n.id;
          return (
            <div
              key={n.id}
              onMouseEnter={(e) => {
                setHoveredNode(n.id);
                const rect = containerRef.current.getBoundingClientRect();
                setHoverPos({ x: e.clientX - rect.left, y: e.clientY - rect.top });
              }}
              onMouseLeave={() => setHoveredNode(null)}
              style={{
                position: 'absolute',
                left: n.x,
                top: n.y,
                width: 150,
                height: 60,
                background: colors.bg,
                border: `1px solid ${colors.border}`,
                borderRadius: 8,
                padding: '12px 14px',
                cursor: 'pointer',
                transition: 'all 200ms ease',
                transform: isHovered ? 'scale(1.04)' : 'scale(1)',
                boxShadow: isHovered ? `0 0 24px ${colors.accent}55` : 'none',
                display: 'flex', alignItems: 'center', gap: 10,
                zIndex: isHovered ? 5 : 2,
              }}
            >
              <Icon name={n.icon} size={14} color={colors.accent}/>
              <span style={{
                fontFamily: DS.mono, fontSize: 12, fontWeight: 500, color: DS.fg,
                letterSpacing: '0.02em',
              }}>{n.label}</span>
            </div>
          );
        })}
      </div>

      {/* Hover card */}
      {hoveredNode && (() => {
        const n = nodeMap[hoveredNode];
        if (!n) return null;

        // Position card to right of node, but flip if too close to right edge
        const containerRect = containerRef.current?.getBoundingClientRect();
        const cardWidth = 320;
        const nodeAbsX = (1100 - 1100) / 2 + n.x + (containerRect ? (containerRect.width - 1100) / 2 : 0);
        const flipLeft = nodeAbsX + 150 + cardWidth + 20 > (containerRect?.width || 1100);

        return (
          <div style={{
            position: 'fixed',
            left: flipLeft ? Math.max(20, hoverPos.x - cardWidth - 20) : hoverPos.x + 20,
            top: Math.min((containerRect?.height || 800) - 380, hoverPos.y + 60),
            width: cardWidth,
            background: 'rgba(13,21,32,0.96)',
            border: `1px solid ${DS.borderMid}`,
            borderRadius: 8,
            padding: 16,
            backdropFilter: 'blur(12px)',
            boxShadow: '0 24px 60px rgba(0,0,0,0.7)',
            zIndex: 1000,
            pointerEvents: 'none',
          }}>
            <div style={{
              fontFamily: DS.mono, fontSize: 13, fontWeight: 600,
              color: nodeColor(n.type).accent,
              marginBottom: 8, letterSpacing: '0.02em',
            }}>{n.label.toUpperCase()}</div>
            <div style={{ fontFamily: DS.body, fontSize: 12.5, color: DS.fg2, lineHeight: 1.55, marginBottom: 14, fontWeight: 300 }}>
              {n.fn}
            </div>

            <div style={{ marginBottom: 10 }}>
              <div style={{ fontFamily: DS.mono, fontSize: 9.5, color: DS.fg3, letterSpacing: '0.10em', marginBottom: 4 }}>INPUTS</div>
              {n.inputs.map(i => (
                <div key={i} style={{ fontFamily: DS.mono, fontSize: 11, color: DS.fg, marginBottom: 2 }}>· {i}</div>
              ))}
            </div>

            <div style={{ marginBottom: 10 }}>
              <div style={{ fontFamily: DS.mono, fontSize: 9.5, color: DS.fg3, letterSpacing: '0.10em', marginBottom: 4 }}>OUTPUTS</div>
              {n.outputs.map(o => (
                <div key={o} style={{ fontFamily: DS.mono, fontSize: 11, color: DS.fg, marginBottom: 2 }}>· {o}</div>
              ))}
            </div>

            {n.branches && (
              <div style={{ marginBottom: 10 }}>
                <div style={{ fontFamily: DS.mono, fontSize: 9.5, color: DS.fg3, letterSpacing: '0.10em', marginBottom: 4 }}>BRANCHES</div>
                {n.branches.map(b => (
                  <div key={b} style={{ fontFamily: DS.mono, fontSize: 11, color: '#fcd34d', marginBottom: 2 }}>· {b}</div>
                ))}
              </div>
            )}

            <div>
              <div style={{ fontFamily: DS.mono, fontSize: 9.5, color: DS.fg3, letterSpacing: '0.10em', marginBottom: 4 }}>FAILURE</div>
              <div style={{ fontFamily: DS.body, fontSize: 11.5, color: DS.fg2, fontWeight: 300, lineHeight: 1.5 }}>{n.failure}</div>
            </div>
          </div>
        );
      })()}
    </div>
  );
};

// ================== APP SHELL ==================

const App = () => {
  const [page, setPage] = useState(() => {
    const hash = window.location.hash.slice(1);
    return ['overview', 'analysis', 'archive', 'architecture'].includes(hash) ? hash : 'overview';
  });

  useEffect(() => {
    const onHashChange = () => {
      const hash = window.location.hash.slice(1);
      if (['overview', 'analysis', 'archive', 'architecture'].includes(hash)) {
        setPage(hash);
      }
    };
    window.addEventListener('hashchange', onHashChange);
    return () => window.removeEventListener('hashchange', onHashChange);
  }, []);

  const navigate = (target) => {
    window.location.hash = target;
    setPage(target);
  };

  return (
    <div style={{ minHeight: '100vh', background: DS.bg }}>
      <TopNav active={page} onNavigate={navigate}/>
      {page === 'overview' && <OverviewPage onNavigate={navigate}/>}
      {page === 'analysis' && <AnalysisPage/>}
      {page === 'archive' && <ArchivePage/>}
      {page === 'architecture' && <ArchitecturePage/>}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

</body>
</html>
